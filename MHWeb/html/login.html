<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — MH Bestiary</title>
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       TOPBAR
  ═══════════════════════════════════════════ -->
  <header class="topbar" id="topbar">
    <div class="topbar__inner">
      <a href="landingpage.html" class="topbar__logo" aria-label="Inicio">
        <span class="topbar__logo-icon">⚔</span>
        <span class="topbar__logo-text">MH<em>Bestiary</em></span>
      </a>
      <nav class="topbar__actions">
        <a href="login.html">
          <button class="btn btn--ghost">Iniciar sesión</button>
        </a>
        <a href="register.html">
          <button class="btn btn--primary">Crear cuenta</button>
        </a>
      </nav>
    </div>
  </header>

  <!-- FONDO -->
  <div class="bg-layers" aria-hidden="true">
    <div class="bg-vignette"></div>
    <canvas id="ember-canvas"></canvas>
    <div class="rune-ring rune-ring--1"></div>
    <div class="rune-ring rune-ring--2"></div>
    <div class="rune-ring rune-ring--3"></div>
    <div class="deco-line deco-line--left"></div>
    <div class="deco-line deco-line--right"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       LOGIN WRAPPER
  ═══════════════════════════════════════════ -->
  <main class="login-bg">

    <div class="login-card">

      <!-- Header -->
      <div class="login-card__header">
        <div class="login-card__ornament">✦ ✦ ✦</div>
        <h1 class="login-card__title">Iniciar sesión</h1>
        <p class="login-card__subtitle">Accede al bestiario del cazador</p>
        <div class="login-card__divider">
          <span class="login-card__divider-gem"></span>
        </div>
      </div>

      <!-- Form -->
      <div class="login-form">

        <div class="form-field">
          <label class="form-field__label" for="email">Correo electrónico</label>
          <div class="form-field__input-wrap">
            <span class="form-field__icon">✉</span>
            <input
              class="form-field__input"
              type="email"
              id="email"
              name="email"
              placeholder="cazador@ejemplo.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="password">Contraseña</label>
          <div class="form-field__input-wrap">
            <span class="form-field__icon">🔒</span>
            <input
              class="form-field__input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button class="form-field__toggle" type="button" aria-label="Mostrar contraseña" id="togglePass">👁</button>
          </div>
          <a href="#" class="form-field__forgot">¿Olvidaste tu contraseña?</a>
        </div>

        <button class="btn btn--primary btn--full" type="button">
          Entrar al bestiario
        </button>

        <div class="login-form__separator">
          <span class="login-form__separator-line"></span>
          <span class="login-form__separator-text">o</span>
          <span class="login-form__separator-line"></span>
        </div>

        <p class="login-form__register">
          ¿No tienes cuenta?
          <a href="register.html" class="login-form__register-link">Crear cuenta</a>
        </p>

      </div>
    </div>
  </main>

  <script>
    const togglePass = document.getElementById('togglePass');
    const passInput = document.getElementById('password');
    togglePass.addEventListener('click', () => {
      const isText = passInput.type === 'text';
      passInput.type = isText ? 'password' : 'text';
      togglePass.textContent = isText ? '🙈' : '🐵';
    });
  </script>

  <script>
    // Brasas flotantes
    const canvas = document.getElementById('ember-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    function randomEmber() {
      return { x: Math.random() * W, y: H + Math.random() * 40, r: Math.random() * 3 + 0.8,
        vx: (Math.random() - 0.5) * 0.6, vy: -(Math.random() * 1.2 + 0.4),
        life: 1, fade: Math.random() * 0.004 + 0.002, hue: Math.random() * 30 + 20 };
    }
    const embers = Array.from({ length: 120 }, () => { const e = randomEmber(); e.y = Math.random() * H; return e; });
    function animateEmbers() {
      ctx.clearRect(0, 0, W, H);
      embers.forEach((e, i) => {
        e.x += e.vx + Math.sin(Date.now() * 0.001 + i) * 0.3;
        e.y += e.vy; e.life -= e.fade;
        if (e.life <= 0 || e.y < -10) { embers[i] = randomEmber(); return; }
        ctx.save(); ctx.globalAlpha = e.life * 0.7;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${e.hue}, 90%, 65%)`;
        ctx.shadowBlur = 6; ctx.shadowColor = `hsl(${e.hue}, 100%, 50%)`;
        ctx.fill(); ctx.restore();
      });
      requestAnimationFrame(animateEmbers);
    }
    animateEmbers();
  </script>
</body>
</html>
