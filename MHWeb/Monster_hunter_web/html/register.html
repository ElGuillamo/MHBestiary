<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — MH Bestiary</title>
  <link rel="stylesheet" href="../css/register.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       TOPBAR
  ═══════════════════════════════════════════ -->
  <header class="topbar" id="topbar">
    <div class="topbar__inner">
      <a href="landingpage.html" class="topbar__logo" aria-label="Inicio">
        <span class="topbar__logo-icon">⚔</span>
        <span class="topbar__logo-text">MH<em>Bestiary</em></span>
      </a>
      <nav class="topbar__actions">
        <a href="login.html">
          <button class="btn btn--ghost">Iniciar sesión</button>
        </a>
        <a href="register.html">
          <button class="btn btn--primary">Crear cuenta</button>
        </a>
      </nav>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       REGISTER WRAPPER
  ═══════════════════════════════════════════ -->
  <main class="login-bg">

    <div class="login-card">

      <!-- Header -->
      <div class="login-card__header">
        <div class="login-card__ornament">✦ ✦ ✦</div>
        <h1 class="login-card__title">Crear cuenta</h1>
        <p class="login-card__subtitle">Únete al gremio de cazadores</p>
        <div class="login-card__divider">
          <span class="login-card__divider-gem"></span>
        </div>
      </div>

      <!-- Form -->
      <div class="login-form">

        <!-- Username -->
        <div class="form-field">
          <label class="form-field__label" for="username">Nombre de cazador</label>
          <div class="form-field__input-wrap">
            <span class="form-field__icon">⚔</span>
            <input
              class="form-field__input"
              type="text"
              id="username"
              name="username"
              placeholder="Tu alias en el gremio"
              autocomplete="username"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="form-field">
          <label class="form-field__label" for="email">Correo electrónico</label>
          <div class="form-field__input-wrap">
            <span class="form-field__icon">✉</span>
            <input
              class="form-field__input"
              type="email"
              id="email"
              name="email"
              placeholder="cazador@ejemplo.com"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-field">
          <label class="form-field__label" for="password">Contraseña</label>
          <div class="form-field__input-wrap">
            <span class="form-field__icon">🔒</span>
            <input
              class="form-field__input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="new-password"
            />
            <button class="form-field__toggle" type="button" aria-label="Mostrar contraseña" id="togglePass">👁</button>
          </div>
          <!-- Strength bar -->
          <div class="strength-bar" id="strengthBar" aria-hidden="true">
            <div class="strength-bar__track">
              <div class="strength-bar__fill" id="strengthFill"></div>
            </div>
            <span class="strength-bar__label" id="strengthLabel"></span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-field">
          <label class="form-field__label" for="confirmPassword">Confirmar contraseña</label>
          <div class="form-field__input-wrap">
            <span class="form-field__icon">🔒</span>
            <input
              class="form-field__input"
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="••••••••"
              autocomplete="new-password"
            />
            <button class="form-field__toggle" type="button" aria-label="Mostrar contraseña" id="toggleConfirm">👁</button>
          </div>
          <span class="form-field__match" id="matchMsg"></span>
        </div>

        <!-- Terms -->
        <label class="form-checkbox">
          <input class="form-checkbox__input" type="checkbox" id="terms" />
          <span class="form-checkbox__box" aria-hidden="true"></span>
          <span class="form-checkbox__text">
            Acepto los <a href="#" class="form-checkbox__link">términos del gremio</a>
          </span>
        </label>

        <button class="btn btn--primary btn--full" type="button" id="submitBtn">
          Unirse al gremio
        </button>

        <div class="login-form__separator">
          <span class="login-form__separator-line"></span>
          <span class="login-form__separator-text">o</span>
          <span class="login-form__separator-line"></span>
        </div>

        <p class="login-form__register">
          ¿Ya tienes cuenta?
          <a href="login.html" class="login-form__register-link">Iniciar sesión</a>
        </p>

      </div>
    </div>
  </main>

  <script>
    // Toggle password visibility
    function toggleVisibility(btnId, inputId) {
      const btn = document.getElementById(btnId);
      const input = document.getElementById(inputId);
      btn.addEventListener('click', () => {
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.textContent = isText ? '🙈' : '🐵';
      });
    }
    toggleVisibility('togglePass', 'password');
    toggleVisibility('toggleConfirm', 'confirmPassword');

    // Password strength
    const passInput = document.getElementById('password');
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const bar = document.getElementById('strengthBar');

    const levels = [
      { label: 'Muy débil',  color: '#a01818', width: '20%' },
      { label: 'Débil',      color: '#c85a18', width: '40%' },
      { label: 'Moderada',   color: '#c8902a', width: '60%' },
      { label: 'Fuerte',     color: '#8ab84a', width: '80%' },
      { label: 'Muy fuerte', color: '#4ab878', width: '100%' },
    ];

    function getStrength(pw) {
      let score = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return Math.min(score, 4);
    }

    passInput.addEventListener('input', () => {
      const pw = passInput.value;
      if (!pw) { bar.classList.remove('strength-bar--visible'); return; }
      bar.classList.add('strength-bar--visible');
      const lvl = levels[getStrength(pw)];
      fill.style.width = lvl.width;
      fill.style.background = lvl.color;
      label.textContent = lvl.label;
      label.style.color = lvl.color;
    });

   
    // Password match — se comprueba al pulsar el botón
    const confirmInput = document.getElementById('confirmPassword');
    const matchMsg = document.getElementById('matchMsg');

    document.getElementById('submitBtn').addEventListener('click', () => {
      if (!confirmInput.value) {
        matchMsg.textContent = '✗ Confirma tu contraseña';
        matchMsg.className = 'form-field__match form-field__match--err';
        return;
      }
      if (confirmInput.value === passInput.value) {
        matchMsg.textContent = '✓ Las contraseñas coinciden';
        matchMsg.className = 'form-field__match form-field__match--ok';
      } else {
        matchMsg.textContent = '✗ Las contraseñas no coinciden';
        matchMsg.className = 'form-field__match form-field__match--err';
      }
    });

  </script>

</body>
</html>
